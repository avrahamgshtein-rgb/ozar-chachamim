<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אוצר חכמים — Network of Jewish Sages</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&family=Heebo:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Map Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="styles-graph.css">

    <style>
        #graph { width: 100%; height: 100%; display: block; }
        #map-view { padding: 0; background: var(--color-bg-light); height: 100%; width: 100%; overflow: hidden; position: relative; }
        #map { width: 100% !important; height: 100% !important; display: block; position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
        .spotify-link { display: inline-flex; align-items: center; gap: 0.5rem; padding: 12px 16px; background: linear-gradient(135deg, #1DB954 0%, #1ed760 100%); color: white; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 0.95rem; transition: all 0.3s ease; width: 100%; text-align: center; justify-content: center; }
        .spotify-link:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(29, 185, 84, 0.3); }
    </style>
</head>
<body>

<header class="header">
    <div class="header-brand">
        <h1>אוצר חכמים</h1>
        <p>Ozar Chachamim — רשת החכמים של ישראל</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchView('graph')">
            <i class="fas fa-project-diagram"></i> רשת קשרים
        </button>
        <button class="tab-btn" onclick="switchView('map')">
            <i class="fas fa-map"></i> גיאוגרפיה
        </button>
        <button class="tab-btn" onclick="switchView('traditions')">
            <i class="fas fa-book"></i> מסורות
        </button>
        <button class="tab-btn" onclick="switchView('ideas')">
            <i class="fas fa-lightbulb"></i> רעיונות
        </button>
    </div>

    <div class="header-controls">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="חפש חכם...">
        </div>
        <button class="control-btn" onclick="resetZoom()" title="Reset zoom">
            <i class="fas fa-home"></i>
        </button>
    </div>
</header>

<div class="container">
    <div id="graph-view" class="main-area active">
        <svg id="graph"></svg>
    </div>

    <div id="map-view" class="main-area">
        <div id="map"></div>
    </div>

    <div id="traditions-view" class="main-area">
        <div class="traditions-grid" id="traditionsGrid"></div>
    </div>

    <div id="ideas-view" class="main-area">
        <div class="ideas-container" id="ideasContainer"></div>
    </div>

    <div class="sidebar" id="sidebar"></div>
</div>

<div class="legend" id="legend">
    <div class="legend-title">📊 מדריך הצבעים</div>
    <div class="legend-section">
        <div class="legend-section-title">תקופות</div>
        <div class="legend-item"><div class="legend-dot" style="background: #ff7f0e;"></div><span>Second Temple</span></div>
        <div class="legend-item"><div class="legend-dot" style="background: #2ca02c;"></div><span>Tannaim</span></div>
        <div class="legend-item"><div class="legend-dot" style="background: #d62728;"></div><span>Amoraim</span></div>
        <div class="legend-item"><div class="legend-dot" style="background: #9467bd;"></div><span>Rishonim</span></div>
        <div class="legend-item"><div class="legend-dot" style="background: #8c564b;"></div><span>Acharonim</span></div>
        <div class="legend-item"><div class="legend-dot" style="background: #e377c2;"></div><span>Modern</span></div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
    let currentView = 'graph';
    let mapInstance = null;
    let graphData = null;

    function switchView(view) {
        currentView = view;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.closest('.tab-btn').classList.add('active');
        document.querySelectorAll('.main-area').forEach(area => area.classList.remove('active'));
        const viewEl = document.getElementById(view + '-view');
        if (viewEl) viewEl.classList.add('active');
        const legend = document.getElementById('legend');
        legend.style.display = view === 'graph' ? 'block' : 'none';

        if (view === 'map' && !mapInstance) initMap();
        if (view === 'traditions' && !document.getElementById('traditionsGrid').innerHTML) buildTraditions();
        if (view === 'ideas' && !document.getElementById('ideasContainer').innerHTML) buildIdeas();
    }

    function resetZoom() {
        if (window.sageNetwork && window.sageNetwork.svg) {
            const svg = window.sageNetwork.svg;
            const width = svg.node().clientWidth;
            const height = svg.node().clientHeight;
            const zoom = d3.zoom().on('zoom', () => {});
            svg.transition()
                .duration(750)
                .call(zoom.transform, d3.zoomIdentity
                    .translate(width / 2, height / 2)
                    .scale(0.8)
                    .translate(-width / 2, -height / 2)
                );
        }
    }

    // FIX BUG 4: Geography view with colored markers
    function initMap() {
        mapInstance = L.map('map').setView([31.5, 35.2], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap', maxZoom: 18
        }).addTo(mapInstance);

        const colorMap = {
            'second-temple': '#ff7f0e', 'tannaim': '#2ca02c', 'amoraim': '#d62728',
            'geonim': '#9467bd', 'rishonim': '#9467bd', 'acharonim': '#8c564b',
            'modern': '#e377c2', 'unknown': '#999999'
        };

        const geoLocations = {
            'Jerusalem': [31.768, 35.214], 'Eretz Israel': [31.5, 35.2], 'Alexandria': [31.2, 29.9],
            'Egypt': [26.8, 30.8], 'Babylon': [32.5, 44.4], 'France': [46.2, 2.2],
            'Provence': [43.9, 5.0], 'Spain': [40.5, -3.7], 'Germany': [51.2, 10.5],
            'Italy': [41.9, 12.6], 'Tiberias': [32.8, 35.4], 'Izmir': [38.4, 27.1],
            'Prague': [50.1, 14.4], 'Ukraine': [49.0, 31.3], 'Yemen': [15.3, 48.2]
        };

        // Add legend
        const legend = L.control({ position: 'bottomleft' });
        legend.onAdd = function() {
            const div = L.DomUtil.create('div', 'legend-map');
            div.innerHTML = `<div style="background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                <h4 style="margin: 0 0 10px 0; font-size: 12px; font-weight: bold;">תקופות</h4>
                <div style="display: flex; flex-direction: column; gap: 5px; font-size: 11px;">
                    <div><span style="display: inline-block; width: 12px; height: 12px; background: #ff7f0e; border-radius: 50%; margin-right: 5px;"></span>Second Temple</div>
                    <div><span style="display: inline-block; width: 12px; height: 12px; background: #2ca02c; border-radius: 50%; margin-right: 5px;"></span>Tannaim</div>
                    <div><span style="display: inline-block; width: 12px; height: 12px; background: #d62728; border-radius: 50%; margin-right: 5px;"></span>Amoraim</div>
                    <div><span style="display: inline-block; width: 12px; height: 12px; background: #9467bd; border-radius: 50%; margin-right: 5px;"></span>Rishonim</div>
                    <div><span style="display: inline-block; width: 12px; height: 12px; background: #8c564b; border-radius: 50%; margin-right: 5px;"></span>Acharonim</div>
                    <div><span style="display: inline-block; width: 12px; height: 12px; background: #e377c2; border-radius: 50%; margin-right: 5px;"></span>Modern</div>
                </div>
            </div>`;
            return div;
        };
        legend.addTo(mapInstance);

        // Add colored markers for sages
        if (graphData && graphData.nodes) {
            graphData.nodes.forEach(node => {
                if (node.location && geoLocations[node.location]) {
                    const coords = geoLocations[node.location];
                    const color = colorMap[node.group] || '#999';
                    L.circleMarker(coords, {
                        radius: 8, fillColor: color, color: 'white', weight: 2,
                        opacity: 1, fillOpacity: 0.8
                    })
                        .bindPopup(`<b>${node.label}</b><br>${node.location}`)
                        .addTo(mapInstance);
                }
            });
        }

        setTimeout(() => mapInstance.invalidateSize(), 300);
    }

    function buildTraditions() {
        if (!graphData || !graphData.nodes) return;
        const traditions = {};
        graphData.nodes.forEach(node => {
            const t = node.field || 'Other';
            if (!traditions[t]) traditions[t] = [];
            traditions[t].push(node);
        });

        let html = '';
        Object.keys(traditions).sort().forEach(tradition => {
            const sages = traditions[tradition];
            html += `<div class="tradition-card">
                <h3>${tradition}</h3>
                <p>${sages.length} חכמים בעלי התמחות בתחום זה</p>
                <div class="tradition-sages">
                    ${sages.map(s => `<span class="sage-tag">${s.label}</span>`).join('')}
                </div>
            </div>`;
        });
        document.getElementById('traditionsGrid').innerHTML = html;
    }

    function buildIdeas() {
        const ideas = {
            'Philosophy & Ethics': {
                periods: ['Rishonim', 'Acharonim'],
                concepts: [
                    { title: 'תורה כחוק טבע', desc: 'Torah as universal law' },
                    { title: 'אתיקה יהודית', desc: 'Ethical development' }
                ]
            }
        };

        let html = '';
        Object.keys(ideas).forEach(category => {
            const idea = ideas[category];
            const colorMap = { 'Tannaim': '#2ca02c', 'Amoraim': '#d62728', 'Rishonim': '#9467bd', 'Acharonim': '#8c564b', 'Modern': '#e377c2' };
            html += `<div class="idea-group">
                <h3>${category}</h3>
                <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap;">
                    ${idea.periods.map(p => `<span style="display: inline-block; padding: 4px 10px; background: ${colorMap[p]}; color: white; border-radius: 12px; font-size: 0.8rem; font-weight: 500;">${p}</span>`).join('')}
                </div>
                ${idea.concepts.map(c => `<div class="idea-card"><h4>"${c.title}"</h4><p>${c.desc}</p></div>`).join('')}
            </div>`;
        });
        document.getElementById('ideasContainer').innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const response = await fetch('data.json');
            graphData = await response.json();
            console.log('✓ Loaded', graphData.nodes.length, 'nodes');
        } catch (e) {
            console.error('✗ Error loading data:', e);
        }
    });
</script>

<script src="graph-fixed.js"></script>

</body>
</html>
