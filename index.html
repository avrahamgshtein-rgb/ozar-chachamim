<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אוצר חכמים — חכמי ישראל לדורותיהם</title>
<style>
:root {
  --bg: #f6f2ea;
  --surface: #fff;
  --border: #e0d5c0;
  --text: #1c1108;
  --muted: #6e5c47;
  --accent: #7c4f1a;
  --sh-sm: 0 1px 4px rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.04);
  --sh-md: 0 4px 16px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.06);
  --sh-lg: 0 8px 32px rgba(0,0,0,.15);
  --r: 14px;
  --r-sm: 8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',Arial,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
button{font-family:inherit}

/* HEADER */
.hd{background:linear-gradient(160deg,#1a0b04 0%,#361506 55%,#562510 100%);color:#fff;padding:3.5rem 1.5rem 2.5rem;text-align:center;position:relative;overflow:hidden}
.hd::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 60%,rgba(255,170,60,.07) 0%,transparent 55%),radial-gradient(ellipse at 70% 40%,rgba(120,80,220,.05) 0%,transparent 55%);pointer-events:none}
.hd-inner{position:relative;z-index:1}
.hd h1{font-size:clamp(2.4rem,7vw,4rem);font-weight:800;letter-spacing:.02em;text-shadow:0 2px 12px rgba(0,0,0,.4);margin-bottom:.3rem}
.hd p{font-size:.98rem;opacity:.62;margin-bottom:1.8rem;letter-spacing:.03em}
.sb{max-width:500px;margin:0 auto;position:relative}
.sb input{width:100%;padding:.72rem 1.2rem .72rem 2.9rem;border-radius:50px;border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.12);color:#fff;font-size:.93rem;direction:rtl;outline:none;backdrop-filter:blur(8px);transition:background .2s,border-color .2s}
.sb input::placeholder{color:rgba(255,255,255,.52)}
.sb input:focus{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.42)}
.sb .ico{position:absolute;left:1rem;top:50%;transform:translateY(-50%);opacity:.5;pointer-events:none;line-height:1}

/* FILTERS */
.fb{position:sticky;top:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.fs{max-width:1220px;margin:0 auto;padding:.6rem 1.2rem;display:flex;gap:.4rem;overflow-x:auto;scrollbar-width:none;align-items:center}
.fs::-webkit-scrollbar{display:none}
.pill{display:inline-flex;align-items:center;gap:.28rem;padding:.32rem .85rem;border-radius:50px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:.8rem;font-weight:500;white-space:nowrap;cursor:pointer;transition:background .14s,color .14s,border-color .14s;line-height:1}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.on{background:var(--pc,var(--accent));border-color:var(--pc,var(--accent));color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.pill .n{font-size:.7em;opacity:.65;font-weight:400}

/* MAIN */
.mc{max-width:1220px;margin:0 auto;padding:1.4rem 1.2rem 3rem}
.rc{font-size:.8rem;color:var(--muted);margin-bottom:1rem;min-height:1.2em}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:1.1rem}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.15rem;cursor:pointer;display:flex;flex-direction:column;gap:.65rem;position:relative;overflow:hidden;box-shadow:var(--sh-sm);transition:transform .15s,box-shadow .15s;outline:none}
.card::before{content:'';position:absolute;top:0;right:0;width:3px;height:100%;background:var(--cc,#ccc);border-radius:0 var(--r) var(--r) 0}
.card:hover{transform:translateY(-2px);box-shadow:var(--sh-md)}
.card:focus-visible{box-shadow:0 0 0 3px var(--accent)}
.badge{display:inline-flex;align-items:center;padding:.16rem .58rem;border-radius:50px;font-size:.7rem;font-weight:700;color:#fff;background:var(--cc,#888);align-self:flex-start;letter-spacing:.02em}
.c-he{font-size:1.18rem;font-weight:700;line-height:1.35;color:var(--text)}
.c-en{font-size:.74rem;color:var(--muted);margin-top:.08rem}
.c-meta{font-size:.77rem;color:var(--muted);display:flex;flex-direction:column;gap:.18rem}
.c-row{display:flex;align-items:baseline;gap:.32rem}
.c-tags{display:flex;flex-wrap:wrap;gap:.28rem;margin-top:auto;padding-top:.2rem}
.chip{padding:.1rem .48rem;border-radius:50px;font-size:.68rem;font-weight:500;background:var(--cbg,#f0e8d8);color:var(--cfg,var(--accent));border:1px solid var(--cbr,rgba(124,79,26,.14))}

/* EMPTY */
.empty{text-align:center;padding:5rem 1.5rem;grid-column:1/-1}
.eico{font-size:3rem;margin-bottom:.65rem}
.empty p{color:var(--muted);font-size:.95rem}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(10,5,0,.65);backdrop-filter:blur(5px);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem;overflow-y:auto;overscroll-behavior:contain;animation:fi .2s ease}
.ov.hide{display:none}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{width:100%;max-width:660px;background:var(--surface);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-lg);animation:su .24s ease;position:relative}
@keyframes su{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{background:linear-gradient(160deg,#1a0b04,#482010);color:#fff;padding:1.7rem 1.5rem 1.45rem;position:relative}
.mc-btn{position:absolute;top:.9rem;left:.9rem;background:rgba(255,255,255,.14);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .14s;line-height:1}
.mc-btn:hover{background:rgba(255,255,255,.26)}
.mp{display:inline-flex;align-items:center;gap:.32rem;padding:.18rem .68rem;border-radius:50px;font-size:.7rem;font-weight:700;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);margin-bottom:.7rem;letter-spacing:.03em}
.mp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mhe{font-size:clamp(1.45rem,5vw,2rem);font-weight:800;line-height:1.2;margin-bottom:.25rem}
.men{font-size:.86rem;opacity:.6}
.mb{padding:1.4rem 1.5rem;display:flex;flex-direction:column;gap:1.3rem}
.sec{display:flex;flex-direction:column;gap:.55rem}
.sec-t{font-size:.66rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding-bottom:.38rem;border-bottom:1px solid var(--border)}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.di{display:flex;flex-direction:column;gap:.12rem}
.dl{font-size:.66rem;color:var(--muted);font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.dv{font-size:.87rem;font-weight:500;color:var(--text)}
.wl{list-style:none;display:flex;flex-direction:column;gap:.32rem}
.wl li{font-size:.87rem;padding:.38rem .75rem;background:var(--bg);border-radius:var(--r-sm);border-right:3px solid var(--accent)}
.il{list-style:none;display:flex;flex-direction:column;gap:.38rem}
.il li{font-size:.87rem;padding-right:1.05rem;position:relative;color:var(--text);line-height:1.55}
.il li::before{content:'◆';position:absolute;right:0;color:var(--accent);font-size:.52rem;top:.46rem}
.tr{display:flex;flex-wrap:wrap;gap:.38rem}
.tchip{padding:.26rem .68rem;border-radius:50px;font-size:.77rem;font-weight:500;background:var(--cbg,#f0e8d8);color:var(--cfg,var(--accent));border:1px solid var(--cbr,rgba(124,79,26,.16))}
.rr{display:flex;flex-wrap:wrap;gap:.42rem}
.rbtn{padding:.3rem .82rem;border-radius:50px;font-size:.78rem;background:#edf2ff;color:#1a3a8b;border:1.5px solid #c5d5f5;cursor:pointer;font-family:inherit;transition:background .13s,color .13s}
.rbtn:hover{background:#1a3a8b;color:#fff}
.sl{list-style:none;display:flex;flex-direction:column;gap:.22rem}
.sl li{font-size:.76rem;color:var(--muted);direction:ltr;text-align:left;font-family:'Consolas','Courier New',monospace;padding:.18rem .45rem;background:#f8f5f0;border-radius:4px}

/* FOOTER */
footer{text-align:center;padding:1.6rem;border-top:1px solid var(--border);color:var(--muted);font-size:.78rem}

/* RESPONSIVE */
@media(max-width:500px){
  .hd{padding:2.5rem 1rem 2rem}
  .mc{padding:1rem .9rem 2rem}
  .grid{grid-template-columns:1fr}
  .dg{grid-template-columns:1fr}
  .ov{padding:0;align-items:flex-end}
  .modal{border-radius:var(--r) var(--r) 0 0;max-height:92vh;overflow-y:auto}
}
@media(min-width:501px) and (max-width:860px){
  .grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

function ts(t){const p=TP[t];return p?`--cbg:${p[0]};--cfg:${p[1]};--cbr:${p[2]};`:'';}

/* ── state ── */
let sages=[], pm={}, pf='all', sq='';

/* ── helpers ── */
function pk(p){
  if(!p)return'other';
  const l=p.toLowerCase();
  if(l.includes('second temple'))return'second-temple';
  if(l.includes('tannaim'))return'tannaim';
  if(l.includes('modern'))return'modern';
  if(l.includes('acharonim')&&l.includes('rishonim'))return'both';
  if(l.includes('rishonim'))return'rishonim';
  if(l.includes('acharonim'))return'acharonim';
  return'other';
}
function pcolor(p){const k=pk(p);return k==='both'?'#7b6020':(PC[k]||'#888');}
function phe(p){
  const k=pk(p);
  if(k==='both')return'ראשונים / אחרונים';
  return pm[k]?pm[k].name_he:p;
}
function fits(s,f){
  if(f==='all')return true;
  const k=pk(s.period);
  if(f==='rishonim') return k==='rishonim'||k==='both';
  if(f==='acharonim')return k==='acharonim'||k==='both';
  return k===f;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── boot ── */
sages = SAGES_DATA;
PERIODS_DATA.forEach(p => pm[p.id] = p);

buildFilters();
render();

document.getElementById('q').addEventListener('input', e => { sq = e.target.value.trim().toLowerCase(); render(); });
document.getElementById('mcl').addEventListener('click', closeModal);
document.getElementById('ov').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

/* ── filters ── */
function buildFilters(){
  const ORDER=['all','second-temple','tannaim','rishonim','acharonim','modern'];
  const LBL={all:'הכל','second-temple':'בית שני',tannaim:'תנאים',rishonim:'ראשונים',acharonim:'אחרונים',modern:'עת החדשה'};
  const fc=document.getElementById('filters');
  fc.innerHTML=ORDER.map(k=>{
    const cnt=k==='all'?sages.length:sages.filter(s=>fits(s,k)).length;
    if(cnt===0&&k!=='all')return'';
    const col=k==='all'?'var(--accent)':(PC[k]||'#888');
    return`<button type="button" class="pill${k==='all'?' on':''}" data-k="${k}" style="--pc:${col}">${LBL[k]||k}<span class="n">${cnt}</span></button>`;
  }).join('');
  fc.addEventListener('click',e=>{
    const b=e.target.closest('.pill');
    if(!b)return;
    fc.querySelectorAll('.pill').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    pf=b.dataset.k;
    render();
  });
}

/* ── render ── */
function render(){
  const f=sages.filter(s=>{
    if(!fits(s,pf))return false;
    if(!sq)return true;
    const h=[s.name_he,s.name_en,s.location,s.period,...(s.tags||[]),...(s.core_ideas||[]),...(s.main_works||[])].join(' ').toLowerCase();
    return h.includes(sq);
  });
  const g=document.getElementById('grid');
  const rc=document.getElementById('rc');
  if(!f.length){
    g.innerHTML='<div class="empty"><div class="eico">📜</div><p>לא נמצאו חכמים התואמים לחיפוש</p></div>';
    rc.textContent='';return;
  }
  rc.textContent=(sq||pf!=='all')?`נמצאו ${f.length} חכמים`:`${f.length} חכמים`;
  g.innerHTML=f.map(s=>{
    const col=pcolor(s.period),ph=phe(s.period);
    const t3=(s.tags||[]).slice(0,3),ex=(s.tags||[]).length-3;
    return`<div class="card" data-id="${s.id}" tabindex="0" role="button" aria-label="${esc(s.name_he)}" style="--cc:${col}">
      <span class="badge">${esc(ph)}</span>
      <div><div class="c-he">${esc(s.name_he)}</div>${s.name_en?`<div class="c-en">${esc(s.name_en)}</div>`:''}</div>
      <div class="c-meta">
        ${s.years?`<div class="c-row"><span>📅</span><span>${esc(s.years)}</span></div>`:''}
        ${s.location?`<div class="c-row"><span>📍</span><span>${esc(s.location)}</span></div>`:''}
      </div>
      <div class="c-tags">
        ${t3.map(t=>`<span class="chip" style="${ts(t)}">${esc(t)}</span>`).join('')}
        ${ex>0?`<span class="chip">+${ex}</span>`:''}
      </div>
    </div>`;
  }).join('');
  g.querySelectorAll('.card').forEach(c=>{
    c.addEventListener('click',()=>openModal(c.dataset.id));
    c.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openModal(c.dataset.id);}});
  });
}

/* ── modal ── */
function openModal(id){
  const s=sages.find(x=>x.id===id);
  if(!s)return;
  const col=pcolor(s.period),ph=phe(s.period);
  document.getElementById('mper').innerHTML=`<span class="mp-dot" style="background:${col}"></span>${esc(ph)}`;
  document.getElementById('mhe').textContent=s.name_he;
  document.getElementById('men').textContent=s.name_en||'';
  const b=[];
  const det=[];
  if(s.period) det.push(['תקופה',s.period]);
  if(s.years)  det.push(['שנות חיים',s.years]);
  if(s.location)det.push(['מקום',s.location]);
  if(det.length)b.push(`<div class="sec"><div class="sec-t">פרטים</div><div class="dg">${det.map(([l,v])=>`<div class="di"><div class="dl">${esc(l)}</div><div class="dv">${esc(v)}</div></div>`).join('')}</div></div>`);
  if(s.main_works&&s.main_works.length)b.push(`<div class="sec"><div class="sec-t">חיבורים עיקריים</div><ul class="wl">${s.main_works.map(w=>`<li>${esc(w)}</li>`).join('')}</ul></div>`);
  if(s.core_ideas&&s.core_ideas.length)b.push(`<div class="sec"><div class="sec-t">רעיונות מרכזיים</div><ul class="il">${s.core_ideas.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`);
  if(s.tags&&s.tags.length)b.push(`<div class="sec"><div class="sec-t">תגיות</div><div class="tr">${s.tags.map(t=>`<span class="tchip" style="${ts(t)}">${esc(t)}</span>`).join('')}</div></div>`);
  const rels=(s.related_sages||[]).map(id=>sages.find(x=>x.id===id)).filter(Boolean);
  if(rels.length)b.push(`<div class="sec"><div class="sec-t">חכמים קשורים</div><div class="rr">${rels.map(r=>`<button type="button" class="rbtn" data-id="${r.id}">${esc(r.name_he)}</button>`).join('')}</div></div>`);
  if(s.source_files&&s.source_files.length)b.push(`<div class="sec"><div class="sec-t">קבצי מקור</div><ul class="sl">${s.source_files.map(f=>`<li>${esc(f)}</li>`).join('')}</ul></div>`);
  document.getElementById('mb').innerHTML=b.join('');
  document.querySelectorAll('.rbtn').forEach(btn=>btn.addEventListener('click',()=>openModal(btn.dataset.id)));
  const ov=document.getElementById('ov');
  ov.scrollTop=0;
  ov.classList.remove('hide');
  document.body.style.overflow='hidden';
  document.getElementById('mcl').focus();
}

function closeModal(){
  document.getElementById('ov').classList.add('hide');
  document.body.style.overflow='';
}
</script>
