<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אוצר חכמים — Network of Jewish Sages</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&family=Heebo:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Map Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="styles-graph.css">

    <style>
        #graph { width: 100%; height: 100%; display: block; }
        #map-view { padding: 0; background: var(--color-bg-light); height: 100%; width: 100%; overflow: hidden; position: relative; }
        #map { width: 100% !important; height: 100% !important; display: block; position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
        .spotify-link { display: inline-flex; align-items: center; gap: 0.5rem; padding: 12px 16px; background: linear-gradient(135deg, #1DB954 0%, #1ed760 100%); color: white; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 0.95rem; transition: all 0.3s ease; width: 100%; text-align: center; justify-content: center; }
        .spotify-link:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(29, 185, 84, 0.3); }
    </style>
</head>
<body>

<header class="header">
    <div class="header-brand">
        <h1>אוצר חכמים</h1>
        <p>Ozar Chachamim — רשת החכמים של ישראל</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchView('graph')">
            <i class="fas fa-project-diagram"></i> רשת קשרים
        </button>
        <button class="tab-btn" onclick="switchView('map')">
            <i class="fas fa-map"></i> גיאוגרפיה
        </button>
        <button class="tab-btn" onclick="switchView('traditions')">
            <i class="fas fa-book"></i> מסורות
        </button>
        <button class="tab-btn" onclick="switchView('ideas')">
            <i class="fas fa-lightbulb"></i> רעיונות
        </button>
    </div>

    <div class="header-controls">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="חפש חכם...">
        </div>
        <button class="control-btn" onclick="resetZoom()" title="Reset zoom">
            <i class="fas fa-home"></i>
        </button>
        <button class="control-btn" id="authButton" onclick="window.sageAuth.showAuthModal()" title="התחברות">
            <i class="fas fa-sign-in-alt"></i> התחברות
        </button>
    </div>
</header>

<!-- Authentication Modal -->
<div id="authModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; flex-direction: column; justify-content: center; align-items: center;">
    <div style="background: white; padding: 2rem; border-radius: 12px; max-width: 400px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.1);">
        <h2 style="margin-top: 0; text-align: center;">אוצר חכמים</h2>

        <div style="margin-bottom: 1rem;">
            <input type="email" id="authEmail" placeholder="דוא״ל" style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; margin-bottom: 0.5rem; box-sizing: border-box;">
            <input type="password" id="authPassword" placeholder="סיסמה" style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; box-sizing: border-box;">
        </div>

        <div style="display: flex; gap: 0.5rem;">
            <button onclick="window.sageAuth.login(document.getElementById('authEmail').value, document.getElementById('authPassword').value); window.sageAuth.updateUIForLoggedIn(); window.sageAuth.hideAuthModal();" style="flex: 1; padding: 0.75rem; background: #4a86e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">
                התחברות
            </button>
            <button onclick="window.sageAuth.signup(document.getElementById('authEmail').value, document.getElementById('authPassword').value); window.sageAuth.updateUIForLoggedIn(); window.sageAuth.hideAuthModal();" style="flex: 1; padding: 0.75rem; background: #34a853; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">
                הרשמה
            </button>
        </div>

        <button onclick="window.sageAuth.hideAuthModal()" style="width: 100%; margin-top: 1rem; padding: 0.75rem; background: #f0f0f0; border: none; border-radius: 6px; cursor: pointer;">
            סגור
        </button>
    </div>
</div>

<div class="container">
    <div id="graph-view" class="main-area active">
        <svg id="graph"></svg>
    </div>

    <div id="map-view" class="main-area">
        <div id="map"></div>
    </div>

    <div id="traditions-view" class="main-area">
        <div class="traditions-grid" id="traditionsGrid"></div>
    </div>

    <div id="ideas-view" class="main-area">
        <div class="ideas-container" id="ideasContainer"></div>
    </div>

    <div class="sidebar" id="sidebar"></div>
</div>

<div class="legend" id="legend">
    <div class="legend-title">📊 מדריך הצבעים</div>
    <div class="legend-section">
        <div class="legend-section-title">תקופות</div>
        <div class="legend-item"><div class="legend-dot" style="background: #ff7f0e;"></div><span>Second Temple</span></div>
        <div class="legend-item"><div class="legend-dot" style="background: #2ca02c;"></div><span>Tannaim</span></div>
        <div class="legend-item"><div class="legend-dot" style="background: #d62728;"></div><span>Amoraim</span></div>
        <div class="legend-item"><div class="legend-dot" style="background: #9467bd;"></div><span>Rishonim</span></div>
        <div class="legend-item"><div class="legend-dot" style="background: #8c564b;"></div><span>Acharonim</span></div>
        <div class="legend-item"><div class="legend-dot" style="background: #e377c2;"></div><span>Modern</span></div>
    </div>
</div>

<!-- Scripts -->
<!-- IMPORTANT: Load order matters! -->
<!-- 1. Supabase Client Module (replaces data-loader + data-validator) -->
<script type="module">
  import { initializeApp } from './supabase-client.js';

  // Initialize Supabase backend on page load
  document.addEventListener('DOMContentLoaded', async () => {
    console.log('🚀 [index.html] Initializing Supabase backend...');
    const ready = await initializeApp();
    if (ready) {
      console.log('✅ [index.html] Supabase initialization complete');
    } else {
      console.error('❌ [index.html] Failed to initialize Supabase');
    }
  });
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
    let currentView = 'graph';
    let mapInstance = null;
    let graphData = null;

    function switchView(view) {
        currentView = view;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.closest('.tab-btn').classList.add('active');
        document.querySelectorAll('.main-area').forEach(area => area.classList.remove('active'));
        const viewEl = document.getElementById(view + '-view');
        if (viewEl) viewEl.classList.add('active');
        const legend = document.getElementById('legend');
        legend.style.display = view === 'graph' ? 'block' : 'none';

        if (view === 'map' && !mapInstance) initMap();
        if (view === 'traditions' && !document.getElementById('traditionsGrid').innerHTML) buildTraditions();
        if (view === 'ideas' && !document.getElementById('ideasContainer').innerHTML) buildIdeas();
    }

    function resetZoom() {
        if (window.sageNetwork && window.sageNetwork.svg) {
            const svg = window.sageNetwork.svg;
            const width = svg.node().clientWidth;
            const height = svg.node().clientHeight;
            const zoom = d3.zoom().on('zoom', () => {});
            svg.transition()
                .duration(750)
                .call(zoom.transform, d3.zoomIdentity
                    .translate(width / 2, height / 2)
                    .scale(0.8)
                    .translate(-width / 2, -height / 2)
                );
        }
    }

    // FIX BUG 4: Geography view with colored markers
    async function initMap() {
        try {
            mapInstance = L.map('map').setView([31.5, 35.2], 4);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap', maxZoom: 18
            }).addTo(mapInstance);

        // Add legend
        const legend = L.control({ position: 'bottomleft' });
        legend.onAdd = function() {
            const div = L.DomUtil.create('div', 'legend-map');
            div.innerHTML = `<div style="background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                <h4 style="margin: 0 0 10px 0; font-size: 12px; font-weight: bold;">תקופות</h4>
                <div style="display: flex; flex-direction: column; gap: 5px; font-size: 11px;">
                    <div><span style="display: inline-block; width: 12px; height: 12px; background: #ff7f0e; border-radius: 50%; margin-right: 5px;"></span>Second Temple</div>
                    <div><span style="display: inline-block; width: 12px; height: 12px; background: #2ca02c; border-radius: 50%; margin-right: 5px;"></span>Tannaim</div>
                    <div><span style="display: inline-block; width: 12px; height: 12px; background: #d62728; border-radius: 50%; margin-right: 5px;"></span>Amoraim</div>
                    <div><span style="display: inline-block; width: 12px; height: 12px; background: #9467bd; border-radius: 50%; margin-right: 5px;"></span>Rishonim</div>
                    <div><span style="display: inline-block; width: 12px; height: 12px; background: #8c564b; border-radius: 50%; margin-right: 5px;"></span>Acharonim</div>
                    <div><span style="display: inline-block; width: 12px; height: 12px; background: #e377c2; border-radius: 50%; margin-right: 5px;"></span>Modern</div>
                </div>
            </div>`;
            return div;
        };
        legend.addTo(mapInstance);

        // Wait for data if not ready
        let retries = 20;
        while (!window.graphData || !window.graphData.nodes) {
            await new Promise(r => setTimeout(r, 100));
            retries--;
            if (retries < 0) {
                console.error('Map: Data timeout');
                return;
            }
        }

        // Add colored markers for sages from Supabase coordinates
        let markersAdded = 0;
        const eraColors = {
            'second-temple': '#ff7f0e',
            'tannaim': '#2ca02c',
            'amoraim': '#d62728',
            'rishonim': '#9467bd',
            'acharonim': '#8c564b',
            'modern': '#e377c2',
            'unknown': '#999'
        };

        window.graphData.nodes.forEach(node => {
            // Check for Supabase coordinates (JSONB)
            if (node.coordinates && typeof node.coordinates === 'object') {
                const lat = node.coordinates.lat || node.coordinates.latitude;
                const lng = node.coordinates.lng || node.coordinates.longitude;

                if (lat && lng) {
                    const color = eraColors[node.era_key] || '#999';

                    const marker = L.circleMarker([lat, lng], {
                        radius: 10,
                        fillColor: color,
                        color: 'white',
                        weight: 2.5,
                        opacity: 1,
                        fillOpacity: 0.85
                    })
                    .bindPopup(`
                      <div style="padding: 1rem; min-width: 250px;">
                        <div style="border-bottom: 2px solid ${color}; padding-bottom: 0.75rem; margin-bottom: 0.75rem;">
                          <h4 style="margin: 0 0 0.25rem 0; color: #1a1a1a;">${node.label}</h4>
                          <div style="font-size: 0.85rem; color: #666;">
                            <div><strong>תקופה:</strong> ${node.era}</div>
                            <div><strong>אזור:</strong> ${node.region || 'Unknown'}</div>
                            <div><strong>תחום:</strong> ${node.primary_field || 'Other'}</div>
                          </div>
                        </div>
                        <div style="font-size: 0.85rem; color: #555; margin-bottom: 0.75rem;">
                          <p style="margin: 0; line-height: 1.4;">${(node.summary || 'אין תיאור זמין').substring(0, 150)}...</p>
                        </div>
                        ${node.connection_count ? `<div style="font-size: 0.8rem; color: #888; margin-bottom: 0.5rem;">🔗 ${node.connection_count} קשרים</div>` : ''}
                        <button onclick="window.sageNetwork && window.sageNetwork.selectNode(window.graphData.nodes.find(n => n.id === '${node.id}'))"
                          style="width: 100%; padding: 0.5rem; background: #4a86e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; font-weight: 600;">
                          📖 ראה פרופיל מלא
                        </button>
                      </div>
                    `, { maxWidth: 300 })
                    .addTo(mapInstance);
                    markersAdded++;
                }
            }
        });
            console.log(`✓ Map: Added ${markersAdded} markers`);

            setTimeout(() => mapInstance.invalidateSize(), 300);
        } catch (error) {
            console.error('❌ initMap error:', error);
            const mapEl = document.getElementById('map');
            if (mapEl) {
                mapEl.innerHTML = '<p style="padding: 2rem; color: red;">Error loading map</p>';
            }
        }
    }

    function buildTraditions() {
        try {
            if (!window.graphData || !window.graphData.nodes || window.graphData.nodes.length === 0) {
                console.warn('⚠️  No valid graph data for traditions');
                document.getElementById('traditionsGrid').innerHTML = '<p style="padding: 2rem; color: #999;">Loading...</p>';
                return;
            }

            const traditions = {};
            window.graphData.nodes.forEach(node => {
                if (!node || !node.primary_field) return;
                const t = node.primary_field || 'Other';
                if (!traditions[t]) traditions[t] = [];
                traditions[t].push(node);
            });

            let html = '';
            Object.keys(traditions).sort().forEach(tradition => {
                const sages = traditions[tradition];
                if (!sages || sages.length === 0) return;
                const eraColors = {
                    'second-temple': '#ff7f0e',
                    'tannaim': '#2ca02c',
                    'amoraim': '#d62728',
                    'rishonim': '#9467bd',
                    'acharonim': '#8c564b',
                    'modern': '#e377c2'
                };
                html += `<div class="tradition-card" style="border-left: 4px solid #4a86e8; padding: 1.5rem; margin-bottom: 1rem; background: #f9f9f9; border-radius: 8px;">
                    <h3 style="margin: 0 0 0.5rem 0; color: #1a1a1a;">${tradition}</h3>
                    <p style="margin: 0 0 1rem 0; color: #666; font-size: 0.9rem;"><strong>${sages.length}</strong> חכמים בתחום זה</p>
                    <div class="tradition-sages" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.75rem;">
                        ${sages.map(s => `
                            <div onclick="window.sageNetwork && window.sageNetwork.selectNode(window.graphData.nodes.find(n => n.id === '${s.id}'))"
                              style="padding: 0.75rem; background: white; border-left: 3px solid ${eraColors[s.era_key] || '#999'}; border-radius: 4px; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; line-height: 1.3;"
                              onmouseover="this.style.boxShadow='0 2px 8px rgba(0,0,0,0.1)'"
                              onmouseout="this.style.boxShadow='none'">
                                <div style="font-weight: 600; color: #1a1a1a;">${s.label || 'Unknown'}</div>
                                <div style="color: #888; font-size: 0.85rem;">${s.era}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            });
            document.getElementById('traditionsGrid').innerHTML = html || '<p>No traditions found</p>';
        } catch (error) {
            console.error('❌ buildTraditions error:', error);
            document.getElementById('traditionsGrid').innerHTML = '<p style="color: red;">Error loading traditions</p>';
        }
    }

    function buildIdeas() {
        try {
            if (!window.graphData || !window.graphData.nodes || window.graphData.nodes.length === 0) {
                console.warn('⚠️  No valid graph data for ideas');
                document.getElementById('ideasContainer').innerHTML = '<p style="padding: 2rem; color: #999;">Loading...</p>';
                return;
            }

            const ideas = {};
            window.graphData.nodes.forEach(node => {
                if (!node || !node.primary_field) return;
                const idea = node.primary_field || 'Other';
                if (!ideas[idea]) ideas[idea] = [];
                ideas[idea].push(node);
            });

            let html = '';
            Object.keys(ideas).sort().forEach(idea => {
                const sages = ideas[idea];
                if (!sages || sages.length === 0) return;
                const eraColors = {
                    'second-temple': '#ff7f0e',
                    'tannaim': '#2ca02c',
                    'amoraim': '#d62728',
                    'rishonim': '#9467bd',
                    'acharonim': '#8c564b',
                    'modern': '#e377c2'
                };
                html += `<div class="idea-group">
                    <h3>${idea}</h3>
                    <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap;">
                        ${sages.slice(0, 5).map(s => {
                            const color = eraColors[s.era_key] || '#999';
                            return `<span style="display: inline-block; padding: 4px 10px; background: ${color}; color: white; border-radius: 12px; font-size: 0.8rem; font-weight: 500;">${s.era}</span>`;
                        }).join('')}
                    </div>
                    <div class="idea-sages" style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
                        ${sages.map(s => `<span class="sage-tag" onclick="window.sageNetwork?.selectNode({id: '${s.id}'})">${s.name_he}</span>`).join('')}
                    </div>
                </div>`;
            });
            document.getElementById('ideasContainer').innerHTML = html || '<p>No ideas found</p>';
        } catch (error) {
            console.error('❌ buildIdeas error:', error);
            document.getElementById('ideasContainer').innerHTML = '<p style="color: red;">Error loading ideas</p>';
        }
    }

    // ========================================================================
    // SEMANTIC SEARCH (Cross-Tab)
    // ========================================================================
    document.addEventListener('DOMContentLoaded', () => {
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', async (e) => {
                const query = e.target.value.trim();

                // Import semantic search
                const { semanticSearch } = await import('./supabase-client.js');
                const results = await semanticSearch(query);

                if (!query) {
                    // Reset all views
                    if (window.sageNetwork) {
                        window.sageNetwork.resetFilter();
                    }
                    return;
                }

                console.log(`🔍 Search: "${query}" → ${results.sages.length} sages`);

                // Update graph view
                if (window.sageNetwork) {
                    window.sageNetwork.filterBySages(results.sages);
                }

                // Highlight results in other tabs
                const resultIds = new Set(results.sages.map(s => s.id));

                // Update traditions view
                const traditionsGrid = document.getElementById('traditionsGrid');
                if (traditionsGrid && traditionsGrid.innerHTML) {
                    document.querySelectorAll('.sage-tag').forEach(tag => {
                        const sageText = tag.textContent;
                        const isMember = Array.from(results.sages).some(s => s.name_he === sageText);
                        tag.style.opacity = isMember ? '1' : '0.3';
                    });
                }

                // Update ideas view
                const ideasContainer = document.getElementById('ideasContainer');
                if (ideasContainer && ideasContainer.innerHTML) {
                    document.querySelectorAll('.sage-tag').forEach(tag => {
                        const sageText = tag.textContent;
                        const isMember = Array.from(results.sages).some(s => s.name_he === sageText);
                        tag.style.opacity = isMember ? '1' : '0.3';
                    });
                }

                // Zoom map to results
                if (mapInstance && results.sages.length > 0) {
                    const coords = results.sages
                        .filter(s => s.coordinates)
                        .map(s => [s.coordinates.lat, s.coordinates.lng]);

                    if (coords.length > 0) {
                        const bounds = L.latLngBounds(coords);
                        mapInstance.fitBounds(bounds, { padding: [50, 50] });
                    }
                }
            });
        }
    });

    // ✅ Supabase data loading handled by supabase-client.js module

    // Data is loaded by supabase-client.js module
    console.log('[index.html] Waiting for Supabase data...');

    // Listen for Supabase ready event to initialize views
    document.addEventListener('supabaseReady', (e) => {
        console.log(`[index.html] ✅ Supabase ready: ${e.detail.nodes} nodes + ${e.detail.links} edges`);
        // Views initialize lazily when tabs are clicked
    });
</script>

<script src="location-mapping.js"></script>
<script src="auth-supabase.js"></script>
<script src="graph.js"></script>

</body>
</html>
